# Render Blueprint — API (web) + Worker (background) de PlacaPe.
# Crea ambos servicios desde los Dockerfiles del monorepo (contexto = raíz).
# Las claves con sync:false se completan en el panel de Render (no en git).
#
# Region "ohio" = US East, junto a Neon (us-east-1) y Upstash US East: minima latencia.
#
# Antes del primer deploy, corre las migraciones desde tu maquina (usa la
# conexion DIRECTA de Neon via DIRECT_URL del .env; el pooler no sirve para migrar):
#   npx prisma migrate deploy --schema packages/db/prisma/schema.prisma
services:
  - type: web
    name: placape-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: ohio
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        value: https://placape.pe
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

  - type: worker
    name: placape-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    plan: starter
    region: ohio
    envVars:
      - key: NODE_ENV
        value: production
      # Arranca en demo para validar el pipeline sin CapSolver; luego pásalo a false.
      - key: DEMO_MODE
        value: "true"
      # SUNARP usa Cloudflare Turnstile. El navegador stealth lo pasa GRATIS en IP
      # residencial, pero en la IP de datacenter de Render casi seguro NO pasa: ahi
      # hay que poner CAPTCHA_PROVIDER=capsolver + CAPTCHA_API_KEY (y quizas un proxy
      # residencial). La data de SUNARP igual se lee por OCR (tesseract), pase quien pase.
      - key: CAPTCHA_PROVIDER
        value: local
      # Sin display en el contenedor; validar en el primer deploy (o usar xvfb-run + headful).
      - key: STEALTH_HEADLESS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CAPTCHA_API_KEY
        sync: false
