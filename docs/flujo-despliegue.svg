<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="880" font-family="Helvetica, Arial, sans-serif">
<rect width="1500" height="880" fill="#FBFCFD"/>
<text x="750.0" y="42" font-size="22" fill="#14506B" text-anchor="middle" font-weight="bold">PlacaPe — Flujo de despliegue:  cómo se actualizan PC · Vercel · VPS</text>
<text x="750.0" y="68" font-size="13.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">El git SIEMPRE sale de tu PC → GitHub. Desde GitHub, Vercel y el VPS se actualizan por separado.</text>
<rect x="40" y="312" width="380" height="182" rx="12" fill="#EAF2F7" stroke="#14506B" stroke-width="2.5"/>
<text x="230.0" y="338" font-size="15" fill="#14506B" text-anchor="middle" font-weight="bold">1 · ESTA PC  (Windows)</text>
<rect x="60" y="348" width="340" height="88" rx="6" fill="#0f2733"/>
<text x="72" y="370" font-size="11.5" fill="#8ee6d8" text-anchor="start" font-weight="normal" font-family="Courier New, monospace"># editas el código, luego:</text>
<text x="72" y="388" font-size="11.5" fill="#8ee6d8" text-anchor="start" font-weight="normal" font-family="Courier New, monospace">git add -A</text>
<text x="72" y="406" font-size="11.5" fill="#8ee6d8" text-anchor="start" font-weight="normal" font-family="Courier New, monospace">git commit -m "mensaje"</text>
<text x="72" y="424" font-size="11.5" fill="#8ee6d8" text-anchor="start" font-weight="normal" font-family="Courier New, monospace">git push origin main</text>
<text x="230" y="482" font-size="11" fill="#5b6b76" text-anchor="middle" font-weight="normal" font-family="Courier New, monospace">d:\Jose\Proyecto_Consulta_placa</text>
<rect x="560" y="350" width="330" height="110" rx="12" fill="#EEF1F4" stroke="#374151" stroke-width="2.5"/>
<text x="725.0" y="376" font-size="15" fill="#374151" text-anchor="middle" font-weight="bold">GitHub · origin/main</text>
<text x="725.0" y="408" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">Fuente de verdad del código.</text>
<text x="725.0" y="425" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">Dispara Vercel y lo jala el VPS.</text>
<rect x="1010" y="120" width="450" height="190" rx="12" fill="#EAF2F7" stroke="#2563EB" stroke-width="2.5"/>
<text x="1235.0" y="146" font-size="15" fill="#2563EB" text-anchor="middle" font-weight="bold">2a · VERCEL — Web (apps/web)</text>
<text x="1235" y="170" font-size="12" fill="#2563EB" text-anchor="middle" font-weight="bold">Deploy AUTOMÁTICO en cada push a main</text>
<text x="1235.0" y="198" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">No corres nada: Vercel detecta el push (webhook),</text>
<text x="1235.0" y="215" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">compila apps/web + @app/shared y publica placape.app.</text>
<text x="1235.0" y="232" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">Aquí viven: la web, el catálogo (niveles), el endpoint</text>
<text x="1235.0" y="249" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">/api/consulta-gratis y la lectura del reporte.</text>
<rect x="1010" y="470" width="450" height="250" rx="12" fill="#E3F6F2" stroke="#0E9E8E" stroke-width="2.5"/>
<text x="1235.0" y="496" font-size="15" fill="#0E9E8E" text-anchor="middle" font-weight="bold">2b · VPS Lima — Motor (operador)</text>
<rect x="1030" y="514" width="410" height="88" rx="6" fill="#0f2733"/>
<text x="1042" y="536" font-size="11.5" fill="#8ee6d8" text-anchor="start" font-weight="normal" font-family="Courier New, monospace">cd /root/app</text>
<text x="1042" y="554" font-size="11.5" fill="#8ee6d8" text-anchor="start" font-weight="normal" font-family="Courier New, monospace">git pull origin main</text>
<text x="1042" y="572" font-size="11.5" fill="#8ee6d8" text-anchor="start" font-weight="normal" font-family="Courier New, monospace">npm run build -w @app/shared   # si cambió shared</text>
<text x="1042" y="590" font-size="11.5" fill="#8ee6d8" text-anchor="start" font-weight="normal" font-family="Courier New, monospace">pm2 restart operador</text>
<text x="1235.0" y="626" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">Manual (SSH). Aquí corre el motor: fuentes,</text>
<text x="1235.0" y="643" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">índice Superbid, DB local. Lee/escribe en Supabase.</text>
<rect x="540" y="540" width="370" height="175" rx="12" fill="#EAFBF5" stroke="#1E9E6A" stroke-width="2.5"/>
<text x="725.0" y="566" font-size="15" fill="#1E9E6A" text-anchor="middle" font-weight="bold">2c · SUPABASE — datos / migraciones</text>
<text x="725" y="588" font-size="12" fill="#1E9E6A" text-anchor="middle" font-weight="bold">Solo si hay una migración nueva:</text>
<rect x="560" y="602" width="330" height="52" rx="6" fill="#0f2733"/>
<text x="572" y="624" font-size="11.5" fill="#8ee6d8" text-anchor="start" font-weight="normal" font-family="Courier New, monospace">-- SQL Editor de Supabase, pegar:</text>
<text x="572" y="642" font-size="11.5" fill="#8ee6d8" text-anchor="start" font-weight="normal" font-family="Courier New, monospace">supabase/migrations/000X_*.sql</text>
<text x="725.0" y="675" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">DB (pedidos, reportes, auth) en la nube.</text>
<text x="725.0" y="692" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">El motor del VPS la consume por PostgREST.</text>
<line x1="420" y1="403.0" x2="560" y2="405.0" stroke="#14506B" stroke-width="2.6"/>
<polygon points="560,405.0 548.2146108853129,410.48676620746835 548.3761530292172,399.1788161341678" fill="#14506B"/>
<text x="490.0" y="394.0" font-size="12.5" fill="#14506B" text-anchor="middle" font-weight="bold">git push</text>
<line x1="890" y1="387.0" x2="1010" y2="215.0" stroke="#2563EB" stroke-width="2.6"/>
<polygon points="1010,215.0 1007.9396000812438,227.83568277010573 998.6646991546114,221.36482165850174" fill="#2563EB"/>
<text x="960.0" y="289.0" font-size="12.5" fill="#2563EB" text-anchor="middle" font-weight="bold">auto (webhook)</text>
<line x1="890" y1="423.0" x2="1010" y2="595.0" stroke="#0E9E8E" stroke-width="2.6"/>
<polygon points="1010,595.0 998.6646991546114,588.6351783414982 1007.9396000812438,582.1643172298942" fill="#0E9E8E"/>
<text x="970.0" y="523.0" font-size="12.5" fill="#0E9E8E" text-anchor="middle" font-weight="bold">git pull (manual)</text>
<line x1="725.0" y1="460" x2="725.0" y2="540" stroke="#1E9E6A" stroke-width="2.6" stroke-dasharray="6 4"/>
<polygon points="725.0,540 719.345448056554,528.2941876694152 730.654551943446,528.2941876694152" fill="#1E9E6A"/>
<text x="795.0" y="491.0" font-size="12.5" fill="#1E9E6A" text-anchor="middle" font-weight="bold">SQL (manual)</text>
<rect x="40" y="600" width="380" height="120" rx="12" fill="#FFF7EC" stroke="#D97706" stroke-width="2"/>
<text x="230" y="626" font-size="13" fill="#9a6300" text-anchor="middle" font-weight="bold">⚠  IMPORTANTE</text>
<text x="230.0" y="650" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">El VPS hace git pull de GITHUB, NO de Vercel.</text>
<text x="230.0" y="667" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">Vercel (web) y VPS (motor) son consumidores</text>
<text x="230.0" y="684" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">INDEPENDIENTES de GitHub — no se hablan entre sí.</text>
<text x="230.0" y="701" font-size="11.5" fill="#5b6b76" text-anchor="middle" font-weight="normal">Hoy usamos scp como atajo; lo normal es git pull.</text>
</svg>