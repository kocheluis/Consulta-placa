<text x="106" y="161" font-size="10" fill="#5b6b76" text-anchor="start" font-weight="normal">· esta PC · backup / reserva</text>
<rect x="300" y="96" width="520" height="50" rx="12" fill="#EAF2F7" stroke="#14506B" stroke-width="2"/>
<text x="560.0" y="125.76" font-size="14" fill="#13344A" text-anchor="middle" font-weight="bold">Usuario consulta una PLACA en placape.pe (web · Vercel)</text>
<polygon points="560.0,173.0 675.0,215 560.0,257.0 445.0,215" fill="#FDF3E3" stroke="#C77700" stroke-width="2"/>
<text x="560.0" y="219.42" font-size="13" fill="#7a4a00" text-anchor="middle" font-weight="normal">¿Gratis o pago?</text>
<rect x="300" y="300" width="520" height="50" rx="12" fill="#FDF3E3" stroke="#C77700" stroke-width="2"/>
<text x="560.0" y="329.76" font-size="14" fill="#7a4a00" text-anchor="middle" font-weight="normal">Compra PRO / ULTRA  →  Checkout</text>
<rect x="300" y="384" width="520" height="54" rx="12" fill="#FDF3E3" stroke="#C77700" stroke-width="2"/>
<text x="560.0" y="406.42" font-size="13" fill="#7a4a00" text-anchor="middle" font-weight="normal">Pago confirmado</text>
<text x="560.0" y="424.42" font-size="13" fill="#7a4a00" text-anchor="middle" font-weight="normal">Yape (admin lo confirma en /admin/pagos)  ·  IziPay (webhook)</text>
<rect x="300" y="474" width="520" height="54" rx="12" fill="#EAF2F7" stroke="#14506B" stroke-width="2"/>
<text x="560.0" y="496.42" font-size="13" fill="#13344A" text-anchor="middle" font-weight="normal">La web encola el PEDIDO en Supabase</text>
<text x="560.0" y="514.4200000000001" font-size="13" fill="#13344A" text-anchor="middle" font-weight="normal">(tabla pedidos · estado: pendiente)</text>
<rect x="300" y="562" width="520" height="54" rx="12" fill="#EEF1F4" stroke="#6B7280" stroke-width="2"/>
<text x="560.0" y="584.42" font-size="13" fill="#374151" text-anchor="middle" font-weight="normal">Cola en Supabase  ·  tabla pedidos</text>
<text x="560.0" y="602.42" font-size="13" fill="#374151" text-anchor="middle" font-weight="normal">pendiente → procesando → listo → entregado</text>
<rect x="300" y="650" width="520" height="58" rx="12" fill="#E3F6F2" stroke="#0E9E8E" stroke-width="2"/>
<text x="560.0" y="674.42" font-size="13" fill="#0c4d46" text-anchor="middle" font-weight="bold">Motor del VPS (Lima · proceso operador, motor automático ON)</text>
<text x="560.0" y="692.42" font-size="13" fill="#0c4d46" text-anchor="middle" font-weight="bold">toma el pedido por orden de llegada  →  procesando</text>
<rect x="300" y="728" width="520" height="40" rx="8" fill="#E3F6F2" stroke="#0E9E8E" stroke-width="2"/>
<text x="560.0" y="752.42" font-size="13" fill="#0c4d46" text-anchor="middle" font-weight="bold">PIPELINE DE FUENTES  (1 reporte a la vez · 1 vCPU)</text>
<rect x="300" y="786" width="520" height="70" rx="12" fill="#F2FBF9" stroke="#16B5A3" stroke-width="2"/>
<text x="560.0" y="808.08" font-size="12" fill="#0c4d46" text-anchor="middle" font-weight="normal">EN PARALELO:</text>
<text x="560.0" y="825.08" font-size="12" fill="#0c4d46" text-anchor="middle" font-weight="normal">SUNARP (Chrome CDP · Turnstile pasivo → identidad + sede)</text>
<text x="560.0" y="842.08" font-size="12" fill="#0c4d46" text-anchor="middle" font-weight="normal">‖  SPRL + Síguelo (historial: dueños, precios, banderas · sin oficina)</text>
<rect x="300" y="872" width="520" height="64" rx="12" fill="#F2FBF9" stroke="#16B5A3" stroke-width="2"/>
<text x="560.0" y="899.58" font-size="12" fill="#0c4d46" text-anchor="middle" font-weight="normal">BURST con CapSolver:</text>
<text x="560.0" y="916.58" font-size="12" fill="#0c4d46" text-anchor="middle" font-weight="normal">SAT captura · SAT papeletas · Callao · MTC (rev. técnica) · SBS (SOAT)</text>
<rect x="300" y="952" width="520" height="44" rx="12" fill="#F2FBF9" stroke="#16B5A3" stroke-width="2"/>
<text x="560.0" y="978.08" font-size="12" fill="#0c4d46" text-anchor="middle" font-weight="normal">Superbid  →  lookup en índice (DB)  →  siniestro / remate</text>
<rect x="300" y="1006" width="520" height="38" rx="8" fill="#F3F4F6" stroke="#B6BBC1" stroke-width="2" stroke-dasharray="4 3"/>
<text x="560.0" y="1029.08" font-size="12" fill="#9099a1" text-anchor="middle" font-weight="normal">ATU (taxi/transporte) — DESACTIVADO (reCAPTCHA v3 por score)</text>
<rect x="300" y="1064" width="520" height="48" rx="12" fill="#E3F6F2" stroke="#0E9E8E" stroke-width="2"/>
<text x="560.0" y="1092.42" font-size="13" fill="#0c4d46" text-anchor="middle" font-weight="normal">Transformación:  toWebReport → buildReport → Report</text>
<rect x="300" y="1130" width="520" height="54" rx="12" fill="#E3F6F2" stroke="#0E9E8E" stroke-width="2"/>
<text x="560.0" y="1152.42" font-size="13" fill="#0c4d46" text-anchor="middle" font-weight="normal">Publicación:  publishReport → Supabase (tabla reportes)</text>
<text x="560.0" y="1170.42" font-size="13" fill="#0c4d46" text-anchor="middle" font-weight="normal">el pedido pasa a  listo</text>
<rect x="300" y="1218" width="520" height="56" rx="12" fill="#E9F6EE" stroke="#1E7A46" stroke-width="2"/>
<text x="560.0" y="1241.42" font-size="13" fill="#15532f" text-anchor="middle" font-weight="bold">La web lee  /api/reporte/[placa]</text>
<text x="560.0" y="1259.42" font-size="13" fill="#15532f" text-anchor="middle" font-weight="bold">stripByTier: recorta las secciones según el NIVEL pagado</text>
<rect x="300" y="1306" width="520" height="46" rx="12" fill="#E9F6EE" stroke="#1E7A46" stroke-width="2"/>
<text x="560.0" y="1333.42" font-size="13" fill="#15532f" text-anchor="middle" font-weight="normal">Render del reporte en la web  +  PDF</text>
<rect x="300" y="1372" width="520" height="46" rx="12" fill="#E9F6EE" stroke="#1E7A46" stroke-width="2"/>
<text x="560.0" y="1399.42" font-size="13" fill="#15532f" text-anchor="middle" font-weight="normal">Entrega:  link web  +  WhatsApp / correo (futuro)</text>
