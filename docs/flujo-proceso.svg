<text x="149.0" y="215.74" font-size="11" fill="#13344A" text-anchor="middle" font-weight="normal">GRATIS (BASIC) — en construcción</text>
<text x="149.0" y="231.74" font-size="11" fill="#13344A" text-anchor="middle" font-weight="normal">SUNARP + SOAT + revisión técnica</text>
<text x="149.0" y="247.74" font-size="11" fill="#13344A" text-anchor="middle" font-weight="normal">encola un pedido BASIC (sin pago)</text>
<rect x="24" y="372" width="250" height="60" rx="10" fill="#FDF3E3" stroke="#C77700" stroke-width="2"/>
<text x="149.0" y="397.74" font-size="11" fill="#13344A" text-anchor="middle" font-weight="normal">Yape: el pago queda PENDIENTE</text>
<text x="149.0" y="413.74" font-size="11" fill="#13344A" text-anchor="middle" font-weight="normal">hasta que el admin lo confirma</text>
<text x="1205.0" y="110" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="bold">INFRAESTRUCTURA Y SOPORTE</text>
<rect x="880" y="786" width="650" height="56" rx="10" fill="#FFFFFF" stroke="#9AA4AE" stroke-width="2" stroke-dasharray="5 3"/>
<text x="1205.0" y="809.58" font-size="12" fill="#4b5563" text-anchor="middle" font-weight="normal">CapSolver — resuelve captchas (imagen + reCAPTCHA v2/v3).</text>
<text x="1205.0" y="826.58" font-size="12" fill="#4b5563" text-anchor="middle" font-weight="normal">Costo medido ≈ S/ 0.025 por reporte completo.</text>
<rect x="880" y="872" width="650" height="60" rx="10" fill="#FFFFFF" stroke="#9AA4AE" stroke-width="2" stroke-dasharray="5 3"/>
<text x="1205.0" y="897.58" font-size="12" fill="#4b5563" text-anchor="middle" font-weight="normal">Índice Superbid — cron diario (6am) escanea subastas</text>
<text x="1205.0" y="914.58" font-size="12" fill="#4b5563" text-anchor="middle" font-weight="normal">(RIMAC, financieras…) → guarda placa+boleta+banderas en la DB.</text>
<rect x="880" y="952" width="650" height="54" rx="10" fill="#FFFFFF" stroke="#9AA4AE" stroke-width="2" stroke-dasharray="5 3"/>
<text x="1205.0" y="974.58" font-size="12" fill="#4b5563" text-anchor="middle" font-weight="normal">DB local  placape.db (SQLite) + carpeta boletas/ (6,561 placas).</text>
<text x="1205.0" y="991.58" font-size="12" fill="#4b5563" text-anchor="middle" font-weight="normal">Backup diario local (pm2, 5am).</text>
<rect x="880" y="1064" width="650" height="354" rx="12" fill="#FFFFFF" stroke="#16B5A3" stroke-width="2"/>
<text x="1205.0" y="1098" font-size="15" fill="#0c4d46" text-anchor="middle" font-weight="bold">NIVELES DEL REPORTE  (stripByTier)</text>
<text x="910" y="1134" font-size="12.5" fill="#14506B" text-anchor="start" font-weight="bold">BASIC  (gratis):</text>
<text x="910" y="1159" font-size="12.5" fill="#13344A" text-anchor="start" font-weight="normal">    identidad · propietarios · SOAT · revisión técnica</text>
<text x="910" y="1209" font-size="12.5" fill="#0E7C71" text-anchor="start" font-weight="bold">PRO:  todo lo de BASIC +</text>
<text x="910" y="1234" font-size="12.5" fill="#13344A" text-anchor="start" font-weight="normal">    siniestralidad · papeletas e infracciones · orden de captura</text>
<text x="910" y="1259" font-size="12.5" fill="#13344A" text-anchor="start" font-weight="normal">    gravámenes / prendas · historial de transferencias</text>
<text x="910" y="1309" font-size="12.5" fill="#9a6300" text-anchor="start" font-weight="bold">ULTRA:  todo lo de PRO +</text>
<text x="910" y="1334" font-size="12.5" fill="#13344A" text-anchor="start" font-weight="normal">    valorización de mercado · análisis con IA · odómetro</text>
<text x="910" y="1384" font-size="12.5" fill="#5b6b76" text-anchor="start" font-weight="normal">Score 0–100 (determinista) + semáforo verde / ámbar / rojo.</text>
