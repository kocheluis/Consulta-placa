<text x="62" y="145" font-size="11" fill="#0E9E8E" text-anchor="start" font-weight="bold">VPS</text>
<text x="106" y="145" font-size="10" fill="#5b6b76" text-anchor="start" font-weight="normal">· Lima · motor + DB + índice</text>
